  REFRESH_SECRET = "your-super-secret-refresh-key-change-in-prod"

[dev]
  command = "npm run dev"
  port = 8000

[[redirects]]
  from = "/api/auth/login*"
  to = "/.netlify/functions/auth-login"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/register*"
  to = "/.netlify/functions/auth-register"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/refresh*"
  to = "/.netlify/functions/auth-refresh"
  status = 200
  force = true

[[redirects]]
  from = "/api/attendance/records*"
  to = "/.netlify/functions/attendance-records"
  status = 200
  force = true

[[redirects]]
  from = "/api/attendance/mark*"
  to = "/.netlify/functions/attendance-mark"
  status = 200
  force = true

[[redirects]]
  from = "/api/attendance/sessions*"
  to = "/.netlify/functions/attendance-sessions"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/reports*"
  to = "/.netlify/functions/admin-reports"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/audit*"
  to = "/.netlify/functions/admin-audit"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/sessions*"
  to = "/.netlify/functions/admin-sessions"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/settings*"
  to = "/.netlify/functions/admin-settings"
  status = 200
  force = true

[[redirects]]
  from = "/api/classes*"
  to = "/.netlify/functions/classes"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[context.production.environment]
  NODE_ENV = "production"
  VITE_API_URL = "/api"
  JWT_SECRET = "your-super-secret-jwt-key-change-in-prod"
  REFRESH_SECRET = "your-super-secret-refresh-key-change-in-prod"
