[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  port = 8000

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NODE_ENV = "production"
  # Set this to your backend URL after deploying to Railway (see instructions below)
  VITE_API_URL = "https://your-app-name.railway.app/api"
