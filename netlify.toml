[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[dev]
  command = "npm run dev"
  port = 8000

[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth:splat"
  status = 200

[[redirects]]
  from = "/api/attendance/*"
  to = "/.netlify/functions/attendance:splat"
  status = 200

[[redirects]]
  from = "/api/classes/*"
  to = "/.netlify/functions/classes:splat"
  status = 200

[[redirects]]
  from = "/api/qr/*"
  to = "/.netlify/functions/qr:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[context.production.environment]
  NODE_ENV = "production"
  VITE_API_URL = "/api"
  JWT_SECRET = "your-secret-jwt-key-change-in-prod"
  REFRESH_SECRET = "your-secret-refresh-key-change-in-prod"
  SUPABASE_URL = "https://xvncrfmuejqmcdcscrze.supabase.co"
  SUPABASE_ANON_KEY = "your-supabase-anon-key"
